<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#fff0f5,#ffe4ec);
    text-align: center;
}

/* PASSWORD */
#passwordScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ffd6e8;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* MAIN */
#main {
    display: none;
    padding: 20px;
}

/* IMAGE */
img {
    width: 90%;
    max-width: 320px;
    height: 320px;
    object-fit: cover;
    border-radius: 15px;
}

/* TEXT */
#text {
    margin: 20px auto;
    font-size: 20px;
    max-width: 320px;
    white-space: pre-line;
}

/* BUTTON */
button {
    padding: 10px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div id="passwordScreen">
<h3>Enter the magic date 💖</h3>
<input id="pass">
<button onclick="login()">Enter</button>
<p id="err"></p>
</div>

<div id="main">
<h2>Juss 100 days to go jaan ❤️</h2>

<img id="img">

<p id="text"></p>

<button onclick="next()">Next</button>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>

/* LOGIN */
function login(){
    if(document.getElementById("pass").value==="080805"){
        document.getElementById("passwordScreen").style.display="none";
        document.getElementById("main").style.display="block";
        start();
    } else {
        document.getElementById("err").innerText="Wrong date";
    }
}

/* MUSIC */
function start(){
    let m=document.getElementById("music");
    m.volume=0.4;
    m.play().catch(()=>{});
    show();
}

/* STORY */
let i=0;
let typing=false;

const story=[
["img1.jpg","HELLAWWWWWWWW MUNGOOOOOO, onli 100 days remain for the biggest festival of the year, the most important day that I have been waiting for a gazillion years jaanu."],
["img2.jpg","My lovely babie seems to grow up so fas, juss yesterday we celebrated my jaanu ka 20th birthday and here we go, the twentieth is juss around the corner now"],
["img3.jpg","I love you sooooo much jaanu, my babie is the best thing to have ever happened to me. There can never be a person remotely as good as you jaan, you are perfect in every way imaginable jaanu"],
["img4.jpg","My babie has grown so much over the years we have known each other. The veri fact that my jaanu chose to trust me even after going through a lot is the biggest proof jaan that we are meant to be jaan"],
["img5.jpg","Everything that you want in life, we will give it our all jaan to make it a reality, we will never let go of each other's hand and become winners together"],
["img6.jpg","Thank you so much for always choosing me jaan, for always standing beside me and always trusting me. Nothing gives me more strength than knowing jaan that you are there with me"],
["img7.jpg","I will forever be indebted to you jaan, no matter wut I do for you, it will never be enough jaanu. Thenk you so much for making me your ajjo jaanu, thenk you soooooooo much"],
["img8.jpg","Now my babie will finally step into 20s, but irrespectively, you'll always be my smol babie, always be in my godi jaan. Forever my everything you are jaan"]
];

/* SHOW */
function show(){
    let img=document.getElementById("img");
    let text=document.getElementById("text");

    img.src=story[i][0];

    let t=story[i][1];

    /* split into 2 lines */
    let mid=Math.floor(t.length/2);
    while(mid<t.length && t[mid]!==" ") mid++;
    let final=t.slice(0,mid)+"\n"+t.slice(mid+1);

    let j=0;
    typing=true;

    function type(){
        text.innerText=final.slice(0,j);
        j++;
        if(j<=final.length){
            setTimeout(type,30);
        } else {
            typing=false;
        }
    }

    type();
}

/* NEXT */
function next(){
    if(typing) return;
    i++;
    if(i<story.length){
        show();
    } else {
        document.getElementById("text").innerText="❤️";
    }
}

/* CURSOR HEARTS */
document.addEventListener("mousemove",e=>{
    let h=document.createElement("div");
    h.innerText="❤️";
    h.style.position="fixed";
    h.style.left=e.clientX+"px";
    h.style.top=e.clientY+"px";
    h.style.fontSize="12px";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),700);
});

/* FLOAT HEARTS */
setInterval(()=>{
    let h=document.createElement("div");
    h.innerText="💖";
    h.style.position="fixed";
    h.style.left=Math.random()*window.innerWidth+"px";
    h.style.bottom="-20px";
    document.body.appendChild(h);

    setTimeout(()=>{
        h.style.transform="translateY(-110vh)";
    },10);

    setTimeout(()=>h.remove(),5000);
},800);

</script>

</body>
</html>
